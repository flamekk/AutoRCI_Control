project:
  name: "AutoRCI_Control"

paths:
  input_root: "input"
  samples_root: "samples"
  reference_root: "reference"
  output_root: "output"
  archive_root: "archive"
  logs_root: "logs"
  reports_dir: "output/reports"
  powerbi_dir: "output/powerbi"
  anomalies_dir: "output/anomalies"
  corrections_dir: "output/corrections"

file_detection:
  extensions:
    erp: [".xlsx", ".xls", ".csv"]
    rci: [".txt", ".csv", ".xlsx", ".xls"]
    pdf: [".pdf"]
  min_required:
    erp: 0
    rci: 0
    pdf: 0

processing:
  archive_after_success: true
  output_reports: true
  run_timezone: "Africa/Casablanca"

reconciliation:
  amount_tolerance: 1.0
  amount_tolerance_mad: 1.0
  date_filter:
    enabled: true
    mode: auto
    days_before: 3
    days_after: 1
    fallback_days: 7

reference:
  rci_coverage:
    enabled: true
    path: reference

email:
  enabled: true
  smtp_host: "sandbox.smtp.mailtrap.io"
  smtp_server: "sandbox.smtp.mailtrap.io"
  smtp_port: 2525
  sender: "autorcicontrol@test.local"
  username: "23eca10440199b"
  recipients:
    - "hibahb132@gmail.com"
  use_tls: false
  password_env_var: "AUTORCI_EMAIL_PASSWORD"
